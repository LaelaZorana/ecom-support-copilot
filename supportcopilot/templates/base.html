<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}SupportCopilot: AI e-commerce support that proves its ROI{% endblock %}</title>
  <meta name="description" content="SupportCopilot: an AI support agent that auto-resolves tier-1 e-commerce tickets with cited, policy-correct answers, and proves the savings on an ops dashboard. Runs fully offline, no API keys." />

  <!-- Vendored offline: Tailwind (Play CDN, JIT) + htmx. No network required. -->
  <script src="/static/vendor/tailwind.js"></script>
  <script>
    // SupportCopilot identity: friendly support — warm teal/emerald primary
    // with a warm coral accent, on warm neutral "sand" surfaces. Rounded & soft.
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            // System-native, friendly geometric stack — no web-font fetch.
            sans: ['"Avenir Next"', "Avenir", '"Nunito Sans"', "ui-rounded",
                   '"SF Pro Rounded"', "system-ui", "-apple-system",
                   '"Segoe UI"', "Roboto", "sans-serif"],
          },
          colors: {
            // Primary — warm teal/emerald (welcoming, modern helpdesk).
            brand: {
              50: "#ecfdf5", 100: "#d1fae5", 200: "#a7f3d0", 300: "#6ee7b7",
              400: "#34d399", 500: "#10b981", 600: "#0d9488", 700: "#0f766e",
              800: "#115e59", 900: "#134e4a",
            },
            // Accent — warm coral (friendly energy, CTAs, highlights).
            coral: {
              50: "#fff1f0", 100: "#ffe1de", 200: "#ffc7c2", 300: "#ffa099",
              400: "#fb7c72", 500: "#f4624f", 600: "#e14a37", 700: "#bd3829",
              800: "#9c3025", 900: "#812c24",
            },
            // Warm neutral "sand" — replaces cold slate as the canvas/ink.
            sand: {
              50: "#faf7f2", 100: "#f3ece1", 200: "#e7dbc9", 300: "#d6c3a8",
              400: "#b39e7e", 500: "#8c7860", 600: "#6b5a47", 700: "#514538",
              800: "#3a3127", 900: "#26201a",
            },
          },
        },
      },
    };
  </script>
  <script src="/static/vendor/htmx.min.js" defer></script>

  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="/static/js/app.js"></script>
</head>
<body class="sc-bg min-h-screen bg-sand-50 text-sand-800 dark:bg-[#171310] dark:text-sand-100 antialiased flex flex-col">

  {% include "partials/nav.html" %}

  <main class="mx-auto w-full max-w-6xl px-4 sm:px-6 lg:px-8 py-8 flex-1">
    {% block content %}{% endblock %}
  </main>

  {% include "partials/footer.html" %}

</body>
</html>
