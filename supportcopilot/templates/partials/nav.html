<header class="sticky top-0 z-30 border-b border-slate-200/70 bg-white/70 backdrop-blur-md dark:border-slate-800/70 dark:bg-slate-950/70">
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 sm:px-6 lg:px-8 h-16">
    <a href="/" class="flex items-center gap-2.5 group">
      <span class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-brand-600 to-violet-500 text-white shadow-lg shadow-brand-500/30">
        <!-- headset / support mark -->
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 18v-6a9 9 0 0 1 18 0v6" />
          <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z" />
        </svg>
      </span>
      <span class="flex flex-col leading-none">
        <span class="text-base font-bold tracking-tight">Support<span class="sc-gradient-text">Copilot</span></span>
        <span class="text-[10px] font-medium uppercase tracking-wider text-slate-400 dark:text-slate-500">AI e-commerce support</span>
      </span>
    </a>

    <nav class="flex items-center gap-1 sm:gap-2">
      <a href="/" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-slate-100 dark:hover:bg-slate-800 {% if active == 'chat' %}text-brand-600 dark:text-brand-400{% else %}text-slate-600 dark:text-slate-300{% endif %}">Chat</a>
      <a href="/dashboard" class="rounded-lg px-3 py-2 text-sm font-medium transition hover:bg-slate-100 dark:hover:bg-slate-800 {% if active == 'dashboard' %}text-brand-600 dark:text-brand-400{% else %}text-slate-600 dark:text-slate-300{% endif %}">ROI Dashboard</a>
      <a href="/api/roi" class="hidden sm:inline rounded-lg px-3 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">API</a>

      <a href="/?demo=1#chat"
         class="ml-1 hidden md:inline-flex items-center gap-1.5 rounded-lg bg-brand-600 px-3 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700">
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Run demo

      <button type="button" onclick="toggleTheme()" aria-label="Toggle dark mode"
              class="sc-focus ml-1 grid h-9 w-9 place-items-center rounded-lg text-slate-500 transition hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">
